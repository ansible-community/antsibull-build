[metadata]
name = ansible
description = Radically simple IT automation
long_description = file: README.rst
long_description_content_type = text/x-rst
author = Ansible, Inc.
author_email = info@ansible.com
url = https://ansible.com/
license = GPL-3.0-or-later
classifiers = 
	  Development Status :: 5 - Production/Stable
	  Environment :: Console
	  Framework :: Ansible
	  Intended Audience :: Developers
	  Intended Audience :: Information Technology
	  Intended Audience :: System Administrators
	  Natural Language :: English
	  Operating System :: POSIX
	  Programming Language :: Python :: 3
	  Programming Language :: Python :: 3.11
	  Programming Language :: Python :: 3.12
	  Programming Language :: Python :: 3.13
	  Programming Language :: Python :: 3 :: Only
version = 12.1.0
project_urls = 
	Build Data = https://github.com/ansible-community/ansible-build-data
	Code of Conduct = https://docs.ansible.com/projects/ansible/latest/community/code_of_conduct.html
	Documentation = https://docs.ansible.com/projects/ansible
	Forum = https://forum.ansible.com

[options]
zip_safe = False
install_requires = 
	  ansible-core ~= 2.19.3
python_requires = >=3.11
package_dir = 
	=.
packages = find_namespace:

[options.entry_points]
console_scripts = 
	ansible-community = ansible_collections.ansible_community:main

[options.packages.find]
include = 
	  ansible_collections
	  ansible_collections.*
